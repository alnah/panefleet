name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew_tap_bump:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: bump homebrew tap formula
        env:
          PANEFLEET_RELEASE_TAG: ${{ github.ref_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          PANEFLEET_HOMEBREW_TAP_REPO: alnah/homebrew-tap
          PANEFLEET_HOMEBREW_FORMULA_PATH: Formula/panefleet.rb
        run: ./scripts/bump-homebrew-tap.sh
