name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: setup goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
          version: "~> v2"

      - name: install runtime and lint dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck ripgrep tmux fzf

      - name: run test suite
        run: ./scripts/test.sh

      - name: verify make install contract
        run: ./tests/test_make_install.sh

      - name: validate release snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make release-check
